services:
  retentionai:
    build: .
    container_name: retentionai-app
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist trained model artifacts so re-running container
      # doesn't re-train from scratch every time
      - retentionai_models:/app/App_training
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  retentionai_models:
